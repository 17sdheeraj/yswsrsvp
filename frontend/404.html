<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 Not found</title>
    <script>
      (function () {
        var path = window.location.pathname.replace(/\/+$/, "") || "/";
        if (path === "/login") {
          var next = new URL(window.location.origin + "/");
          next.searchParams.set("view", "login");
          window.location.replace(next.toString());
        }
      })();
    </script>
    <style>
      :root {
        --hcred: #ec3750;
        --hcorange: #ff8c37;
        --hccyan: #5bc0de;
        --hcborder: #334155;
        --hctext: #f8fafc;
        --hcmuted: #9aa9bc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: var(--hctext);
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(900px 450px at 0% -20%, #ec375033 0%, transparent 70%),
          radial-gradient(850px 450px at 100% 120%, #338eda33 0%, transparent 70%),
          linear-gradient(150deg, #120b12, #0f172a 50%, #18122b 100%);
      }

      .shell404 {
        width: min(680px, 100%);
        border: 1px solid var(--hcborder);
        border-radius: 22px;
        padding: 28px;
        background: linear-gradient(180deg, #172033e6, #111827d9);
        box-shadow: 0 20px 60px #00000055;
      }

      .code404 {
        margin: 0;
        font-size: clamp(58px, 13vw, 110px);
        line-height: 0.9;
        letter-spacing: -0.04em;
        background: linear-gradient(120deg, var(--hcorange), var(--hcred), var(--hccyan));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .title404 {
        margin: 8px 0 0;
        font-size: clamp(24px, 5vw, 34px);
        letter-spacing: -0.02em;
      }

      .copy404 {
        margin: 10px 0 18px;
        color: var(--hcmuted);
        line-height: 1.6;
      }

      .actions404 {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn404 {
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-radius: 12px;
        padding: 11px 16px;
        font-weight: 600;
        font-size: 14px;
      }

      .btn404.primary404 {
        background: linear-gradient(135deg, var(--hcred), var(--hcorange));
        color: var(--hctext);
        border: 0;
      }

      .btn404.secondary404 {
        background: #1f2937;
        border: 1px solid var(--hcborder);
        color: #cbd5e1;
      }

      .tip404 {
        margin: 16px 0 0;
        font-size: 12px;
        color: var(--hcmuted);
      }

      .btn404:focus-visible {
        outline: 2px solid var(--hccyan);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <main class="shell404">
      <p class="code404">404</p>
      <h1 class="title404">You wandered off</h1>
      <p class="copy404">
        That link doesn’t exist here. Head back to the main page and continue where you left off.
      </p>
      <div class="actions404">
        <a class="btn404 primary404" href="./index.html">Go to Main page</a>
        <a class="btn404 secondary404" href="./admin.html" target="_blank" rel="noreferrer">Admin Portal</a>
      </div>
      <p class="tip404">If you typed the URL manually, double-check for typos.</p>
    </main>
  </body>
</html>
